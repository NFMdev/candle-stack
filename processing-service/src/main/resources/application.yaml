spring:
  application:
    name: processing-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:processing-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      concurrency: 1
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/candlestack}
    username: ${DB_USERNAME:candlestack}
    password: ${DB_PASSWORD:candlestack}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        '[format_sqL]': true
  
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  kafka:
    topics:
      market-trades: ${MARKET_TRADES_TOPIC:market-trades}

logging:
  level:
    '[com.github.nfmdev.candlestack.processing_service]': DEBUG
    '[org.springframework.kafka]': INFO